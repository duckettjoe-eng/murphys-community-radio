name: Sync Mixcloud Archive

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: read

concurrency:
  group: sync-mixcloud-archive
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Mixcloud archive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MIXCLOUD_ARCHIVE_SLUGS: ${{ vars.MIXCLOUD_ARCHIVE_SLUGS || 'skullcountyradio' }}
        run: npm run archive:mixcloud
